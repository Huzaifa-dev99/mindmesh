version: '3.8'

# Minimal development setup (external databases)
# Use when you have PostgreSQL and Qdrant running locally outside Docker
# Run with: docker-compose up --build

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:root@localhost:5432/mindmesh
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://localhost:6333
      - DEBUG=true
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app