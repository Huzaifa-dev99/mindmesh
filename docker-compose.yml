services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mindmesh}
      POSTGRES_USER: ${POSTGRES_USER:-mindmesh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindmesh_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindmesh_user} -d ${POSTGRES_DB:-mindmesh}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.7
    ports:
      - "${QDRANT_HTTP_PORT:-6335}:6333"
      - "${QDRANT_GRPC_PORT:-6336}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mindmesh_user}:${POSTGRES_PASSWORD:-mindmesh_password}@postgres:5432/${POSTGRES_DB:-mindmesh}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-true}
      APP_ENV: ${APP_ENV:-development}
      CORS_ORIGINS: http://localhost:8501,http://frontend:8501,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WORKSPACE_PIN: ${WORKSPACE_PIN:-0000}
      VITE_SINGLE_USER_EMAIL: ${SINGLE_USER_EMAIL:-local@mindmesh.local}
      VITE_SINGLE_USER_PASSWORD: ${SINGLE_USER_PASSWORD:-mindmesh-local-workspace-password}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  qdrant_data:
