services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mindmesh}
      POSTGRES_USER: ${POSTGRES_USER:-mindmesh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindmesh_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindmesh_user} -d ${POSTGRES_DB:-mindmesh}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.7
    ports:
      - "${QDRANT_HTTP_PORT:-6335}:6333"
      - "${QDRANT_GRPC_PORT:-6336}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-${MINIO_USER:-minioadmin}}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-${MINIO_PASSWORD:-minioadmin}}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mindmesh_user}:${POSTGRES_PASSWORD:-mindmesh_password}@postgres:5432/${POSTGRES_DB:-mindmesh}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      QDRANT_NOTES_COLLECTION: notes
      QDRANT_DOCUMENTS_COLLECTION: documents
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_PASSWORD:-minioadmin}}
      MINIO_BUCKET: ${MINIO_BUCKET:-mindmesh-documents}
      MINIO_SECURE: "false"
      MINIO_DATA_PATH: /minio-data
      DEBUG: ${DEBUG:-true}
      APP_ENV: ${APP_ENV:-development}
      CORS_ORIGINS: http://localhost:8501,http://127.0.0.1:8501,http://frontend:8501,http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - minio_data:/minio-data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      VITE_API_BASE_URL: ""
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_WORKSPACE_PIN: ${WORKSPACE_PIN:-}
      VITE_SINGLE_USER_EMAIL: ${SINGLE_USER_EMAIL:-local@mindmesh.app}
      VITE_SINGLE_USER_PASSWORD: ${SINGLE_USER_PASSWORD:-mindmesh-local-workspace-password}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8501/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
