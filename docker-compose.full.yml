version: '3.8'

# Complete end-to-end production-ready setup
# Use for complete project deployment with all services, volumes, and configurations
# Run with: docker-compose -f docker-compose.full.yml up --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mindmesh_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://mindmesh_user:mindmesh_password@postgres:5432/mindmesh
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - DEBUG=false
      - APP_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - mindmesh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mindmesh_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_logs:/app/logs
    networks:
      - mindmesh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:13-alpine
    container_name: mindmesh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindmesh
      POSTGRES_USER: mindmesh_user
      POSTGRES_PASSWORD: mindmesh_password
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    networks:
      - mindmesh_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindmesh_user -d mindmesh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mindmesh_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    networks:
      - mindmesh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  qdrant_data:
    driver: local
  qdrant_snapshots:
    driver: local
  backend_logs:
    driver: local
  frontend_logs:
    driver: local

networks:
  mindmesh_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16