version: '3.8'

# Development setup with local PostgreSQL and Qdrant
# Use when you want a complete local development environment
# Run with: docker-compose -f docker-compose.local.yml up --build

services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://mindmesh_user:mindmesh_password@postgres:5432/mindmesh
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - CORS_ORIGINS=http://localhost:8501,http://127.0.0.1:8501,http://frontend:8501,http://localhost:5173,http://127.0.0.1:5173
      - DEBUG=true
    depends_on:
      - postgres
      - qdrant
    volumes:
      - ./backend:/app
    networks:
      - mindmesh_local

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      - VITE_API_BASE_URL=
      - VITE_API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mindmesh_local

  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: mindmesh
      POSTGRES_USER: mindmesh_user
      POSTGRES_PASSWORD: mindmesh_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mindmesh_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindmesh_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - mindmesh_local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:

networks:
  mindmesh_local:
    driver: bridge
